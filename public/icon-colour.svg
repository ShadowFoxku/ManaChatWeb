<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="#2db891" >

  <rect width="100%" height="100%" fill="#0f1412" />
  <!-- Crown (top flat edge) -->
  <polygon points="55,72 145,72 170,105 100,185 30,105" fill="currentColor" opacity="0.18"/>

  <!-- Top-left bezel facet -->
  <polygon points="100,18 55,72 100,72" fill="currentColor" opacity="0.55"/>
  <!-- Top-right bezel facet -->
  <polygon points="100,18 145,72 100,72" fill="currentColor" opacity="0.35"/>

  <!-- Left pavilion facet -->
  <polygon points="30,105 55,72 100,185" fill="currentColor" opacity="0.65"/>
  <!-- Right pavilion facet -->
  <polygon points="170,105 145,72 100,185" fill="currentColor" opacity="0.45"/>

  <!-- Outline -->
  <polygon points="100,18 145,72 170,105 100,185 30,105 55,72"
           stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" opacity="0.85"/>

  <!-- Crown table outline -->
  <line x1="55" y1="72" x2="145" y2="72" stroke="currentColor" stroke-width="1" opacity="0.5"/>

  <!-- Inner lines -->
  <line x1="100" y1="18" x2="100" y2="185" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
  <line x1="55" y1="72" x2="100" y2="185" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
  <line x1="145" y1="72" x2="100" y2="185" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
</svg>
