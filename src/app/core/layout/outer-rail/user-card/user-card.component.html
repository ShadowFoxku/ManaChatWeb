<div
  class="user-card absolute left-2 w-56 rounded-2xl p-3"
  style="bottom: calc(100% + 8px); background: var(--color-surface-raised); border: 1px solid var(--color-stroke); box-shadow: 0 8px 32px rgba(0,0,0,0.4);"
  role="dialog"
  aria-label="User settings"
>

  <!-- Avatar + name + status -->
  <div class="mb-1 flex items-center gap-2.5">
    <div class="relative flex-shrink-0">
      <div
        class="card-avatar flex h-10 w-10 items-center justify-center rounded-full text-sm font-bold"
        style="background: linear-gradient(135deg, var(--color-primary), #25a07d); color: #0f1412;"
      >
        PH
      </div>
      <div
        class="absolute bottom-0 right-0 h-2.5 w-2.5 rounded-full"
        style="border: 2px solid var(--color-surface-raised);"
        [style.background]="activePresence().color"
      ></div>
    </div>

    <div class="flex min-w-0 flex-1 flex-col gap-1">
      <span
        class="overflow-hidden text-ellipsis whitespace-nowrap text-sm font-bold"
        style="color: var(--color-text);"
      >
        Roku (PH)
      </span>
      <input
        class="card-status-input w-full border-b border-transparent bg-transparent p-0 text-xs outline-none"
        style="color: var(--color-text-muted);"
        [value]="statusText()"
        (input)="statusText.set($any($event.target).value)"
        placeholder="Set a status…"
        maxlength="64"
      />
    </div>
  </div>

  <div class="my-2.5 h-px" style="background: var(--color-stroke);"></div>

  <!-- Settings -->
  <a
    class="card-action-row flex w-full cursor-pointer items-center gap-2 rounded-lg border-none bg-transparent px-2 py-1.5 no-underline"
    style="color: var(--color-text-muted); font-size: 13px;"
    routerLink="/settings"
  >
    <ng-icon name="lucideUserCog" size="18" />
    Settings
  </a>

</div>
