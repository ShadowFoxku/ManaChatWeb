<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label [for]="forId()" class="field-label">{{ label() }}</label>
  }

  <ng-content />

  @if (error()) {
    <span class="field-error-msg" role="alert">{{ error() }}</span>
  } @else if (hint()) {
    <span class="field-hint-msg">{{ hint() }}</span>
  }
</div>
