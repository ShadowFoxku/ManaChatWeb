<button
  [type]="type()"
  [disabled]="isDisabled"
  [ngClass]="['btn', 'btn-' + variant(), fullWidth() ? 'btn-full' : '']"
  (click)="onClick($event)"
>
  @if (loading()) {
    <app-mana-loader [size]="18" label="" [color]="loaderColor" [shimmerColor]="loaderShimmerColor"></app-mana-loader>
  } @else {
    <ng-content />
  }
</button>
