<div class="relative">
  <input
    [id]="id()"
    [name]="name()"
    type="password"
    [placeholder]="placeholder()"
    [disabled]="isDisabled"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"
    autocomplete="current-password"
    class="peer field-input field-input-icon"
    [class.field-input-error]="hasError()"
  />
  <span class="field-icon peer-focus:text-primary" aria-hidden="true">
    <ng-icon name="lucideLockKeyhole" size="18" />
  </span>
</div>

@if (showStrength() && value.length > 0) {
  <div
    class="mt-1.5 h-1 overflow-hidden rounded-sm bg-stroke"
    [attr.aria-valuenow]="value.length"
    aria-label="Password strength"
  >
    <div
      class="h-full rounded-sm transition-[width,background] duration-300 ease-in-out"
      [style.width]="strength.width"
      [style.background]="strength.color"
    ></div>
  </div>
  <span
    class="mt-1 block text-xs transition-colors duration-300"
    [style.color]="strength.color"
  >
    {{ strength.label }}
  </span>
}
